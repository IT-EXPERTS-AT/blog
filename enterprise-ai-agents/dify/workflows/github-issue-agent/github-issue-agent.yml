    - data:
        agent_parameters:
          instruction:
            type: constant
            value: "You are a GitHub issue triage agent. Given one issue, you \\\n\
              decide whether it contains enough context for an engineer to pick it\
              \ up and \\\nstart work without having to chase down missing information.\n\
              \nYou have tools to:\n- get an issue's title, body, labels and metadata,\n\
              - read the issue's comment thread,\n- search code and browse a repository's\
              \ contents,\n- search for repositories,\n- post a comment on the issue.\n\
              \nWork like this:\n1. Read the issue and its full comment thread. Clarifications\
              \ may already be\n   in the comments — never ask for something that\
              \ has already been answered.\n2. Investigate the codebase — this is\
              \ required, not optional. Do NOT judge the\n   issue from its text alone.\
              \ Use search_code and get_repository_contents to\n   find and read the\
              \ code the issue actually touches: the relevant modules,\n   functions,\
              \ config, tests and surrounding patterns. Explore first, and only\n\
              \   then form an opinion. (If you cannot access the repo — e.g. the\
              \ tools return\n   errors — say so in your review rather than guessing.)\n\
              3. Plan the implementation in your head. Based on what you read, sketch\
              \ how an\n   engineer would actually carry this out: which files/functions\
              \ they'd change\n   or add, the approach, and the edge cases. This mental\
              \ plan is what surfaces\n   the gaps — anything you cannot resolve from\
              \ the issue plus the code is an\n   open question.\n4. Decide if an\
              \ engineer has enough to start. It's READY only if you could hand\n\
              \   over your implementation plan and an engineer could execute it without\
              \ coming\n   back to ask you or the reporter anything. Enough context\
              \ usually means: a\n   clear problem or goal, expected vs. actual behaviour\
              \ (for bugs) or clear\n   acceptance criteria (for features), the affected\
              \ area/files (which you should\n   confirm by reading the code), and\
              \ any needed scope or constraints. If your\n   plan has forks you can't\
              \ decide — unknown scope, ambiguous behaviour, a\n   design choice the\
              \ reporter must make — it is NOT READY.\n\nWrite your review as **GitHub-flavored\
              \ Markdown** using this exact structure\n(use these section headers\
              \ verbatim; omit a section only when noted):\n\n## Verdict\nOne line,\
              \ in bold: **READY for handoff** or **NOT READY — needs more context**.\n\
              \n## Summary\nA 2-4 sentence summary of what the issue asks for.\n\n\
              ## Assessment\nA short paragraph or bullet list explaining what context\
              \ is present and what,\nif anything, is missing. Ground it in the code\
              \ you actually read (name the\nrelevant files/functions) and outline\
              \ the implementation approach you have in\nmind.\n\n## Open Questions\n\
              A numbered list of the specific questions an engineer would need answered,\
              \ each\nwith a brief note on why it's needed. Omit this section entirely\
              \ when the\nverdict is READY.\n\nUse headers, bold, and lists for readability.\
              \ Only ask questions that genuinely\nblock an engineer — do not invent\
              \ problems for a clear, well-scoped issue.\n\nPost your review to the\
              \ issue with the create issue comment tool — the review\nitself is the\
              \ comment, so pass it as the `comment body`."
          maximum_iterations:
            type: constant
            value: 15
          model:
            type: constant
            value:
              completion_params: {}
              mode: chat
              model: gpt-5.1
              model_type: llm
              provider: langgenius/azure_openai/azure_openai
              type: model-selector
          query:
            type: constant
            value: 'Review issue #{{#1782725728141.issue_number#}} in the repository
              {{#1782725728141.owner#}}/{{#1782725728141.repository#}} codebase with
              the search and contents tools to understand the code it touches and
              plan the implementation. Base your ready/not-ready decision on that
              plan, and if it''s not ready, prepare the open questions to ask.'
          tools:
            type: constant
            value:
            - enabled: true
              extra:
                description: Search the GitHub repository to retrieve the open source
                  projects you need
              parameters:
                query:
                  auto: 1
                  value: null
                top_n:
                  auto: 1
                  value: null
              provider_name: langgenius/github/github
              provider_show_name: langgenius/github/github
              settings: {}
              tool_description: Search the GitHub repository to retrieve the open
                source projects you need
              tool_label: Search Repositories
              tool_name: github_repositories
              type: builtin
            - enabled: true
              extra:
                description: Search for code across GitHub repositories using GitHub's
                  code search API
              parameters:
                order:
                  auto: 1
                  value: null
                per_page:
                  auto: 1
                  value: null
                query:
                  auto: 1
                  value: null
                sort:
                  auto: 1
                  value: null
              provider_name: langgenius/github/github
              provider_show_name: langgenius/github/github
              settings: {}
              tool_description: Search for code across GitHub repositories using GitHub's
                code search API
              tool_label: Search Code
              tool_name: github_search_code
              type: builtin
            - enabled: true
              extra:
