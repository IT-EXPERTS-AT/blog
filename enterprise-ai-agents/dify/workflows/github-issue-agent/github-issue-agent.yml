                repo:
                  auto: 1
                  value: null
              provider_name: langgenius/github/github
              provider_show_name: langgenius/github/github
              settings: {}
              tool_description: Get contents from a GitHub repository directory or
                file with optional branch specification
              tool_label: Repository Contents
              tool_name: github_repository_contents
              type: builtin
            - enabled: true
              extra:
                description: Get a single issue by number, including its full body,
                  state, labels, and metadata
              parameters:
                issue_number:
                  auto: 1
                  value: null
                owner:
                  auto: 1
