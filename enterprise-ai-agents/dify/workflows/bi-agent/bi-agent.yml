    - data:
        code: "\"\"\"Dify \"Code\" node: render the BIReport into a PDF.\n\nPaste\
          \ the body into a Python code node. Wire one input variable:\n    report\
          \  (Object)  <- the structured output of the Agent node\n\nThe Agent node\
          \ returns the BIReport as a JSON object; depending on how the input\nis\
          \ wired it may arrive as a dict or as a JSON string, so we handle both:\n\
          \    {title, period, executive_summary,\n     key_metrics: [{name, value,\
          \ note}, ...],\n     insights: [...], recommendations: [...]}\n\nWhy fpdf2\
          \ and not reportlab (which the Prefect stack uses): Dify runs code nodes\n\
          in a seccomp-sandboxed process that kills native-code libraries with \"\
          bad system\ncall\". reportlab ships a C extension (and pulls in Pillow),\
          \ so it can't run\nhere; fpdf2 is pure Python and works. The sandbox also\
          \ has no shared output\nfolder, so we build the PDF in memory and return\
          \ it encoded:\n    pdf_base64    raw base64  -> use if the file tool has\
          \ a base64/binary option\n    pdf_data_uri  data: URL   -> use if the file\
          \ tool auto-decodes data URLs\nA file tool that writes the base64 *text*\
          \ verbatim (instead of decoding it)\nproduces a \"corrupt\" PDF — one of\
          \ these two forms makes it decode correctly.\n\nRequires `fpdf2` in the\
          \ sandbox (see dify/python-requirements.txt).\n\"\"\"\n\nimport base64\n\
          import json\nfrom datetime import datetime\n\nfrom fpdf import FPDF\nfrom\
          \ fpdf.enums import TableCellFillMode\nfrom fpdf.fonts import FontFace\n\
          \nNAVY = (44, 62, 80)\nGREY = (110, 110, 110)\nZEBRA = (242, 244, 246)\n\
          \n# fpdf2's core fonts only cover latin-1 (256 chars). Loading a Unicode\
          \ TTF would\n# mean reading a font file from disk, which the sandbox blocks\
          \ — so instead we\n# map the punctuation LLMs typically emit to ASCII, then\
          \ drop anything left over.\n_REPLACEMENTS = {\n    \"–\": \"-\", \"—\":\
          \ \"-\",       # en / em dash\n    \"‘\": \"'\", \"’\": \"'\",       # smart\
          \ single quotes\n    \"“\": '\"', \"”\": '\"',       # smart double quotes\n\
          \    \"…\": \"...\",                    # ellipsis\n    \"•\": \"-\",  \
          \                    # bullet\n    \" \": \" \",                      #\
          \ non-breaking space\n    \"→\": \"->\",                     # arrow\n \
          \   \"€\": \"EUR\", \"™\": \"(TM)\",  # euro, trademark\n}\n\n\ndef _s(text)\
          \ -> str:\n    \"\"\"Make text safe for fpdf2's latin-1 core fonts.\"\"\"\
          \n    text = str(text)\n    for bad, good in _REPLACEMENTS.items():\n  \
          \      text = text.replace(bad, good)\n    return text.encode(\"latin-1\"\
          , \"ignore\").decode(\"latin-1\")\n\n\ndef main(report) -> dict:\n    #\
          \ Dify may hand the Agent's structured output across as a JSON string\n\
          \    # rather than an object, depending on how the input variable is wired.\n\
          \    if isinstance(report, str):\n        report = json.loads(report)\n\n\
          \    pdf = FPDF(format=\"A4\")\n    pdf.set_margins(20, 20, 20)\n    pdf.set_auto_page_break(auto=True,\
          \ margin=20)\n    pdf.add_page()\n\n    # Title + rule\n    pdf.set_font(\"\
          Helvetica\", \"B\", 22)\n    pdf.set_text_color(*NAVY)\n    pdf.multi_cell(pdf.epw,\
          \ 10, _s(report[\"title\"]))\n    pdf.set_draw_color(*NAVY)\n    pdf.set_line_width(0.6)\n\
          \    pdf.line(pdf.l_margin, pdf.get_y() + 1, pdf.w - pdf.r_margin, pdf.get_y()\
          \ + 1)\n    pdf.ln(5)\n\n    # Period / generated, muted\n    pdf.set_font(\"\
          Helvetica\", \"I\", 10)\n    pdf.set_text_color(*GREY)\n    pdf.cell(0,\
          \ 5, _s(f\"Period: {report['period']}\"), new_x=\"LMARGIN\", new_y=\"NEXT\"\
          )\n    pdf.cell(0, 5, f\"Generated: {datetime.now():%Y-%m-%d %H:%M}\", new_x=\"\
          LMARGIN\", new_y=\"NEXT\")\n    pdf.ln(4)\n\n    _heading(pdf, \"Executive\
          \ Summary\")\n    _body(pdf, _s(report[\"executive_summary\"]))\n    pdf.ln(3)\n\
          \n    _heading(pdf, \"Key Metrics\")\n    _metrics_table(pdf, report[\"\
          key_metrics\"])\n    pdf.ln(4)\n\n    _heading(pdf, \"Insights\")\n    _bullets(pdf,\
          \ report[\"insights\"])\n    pdf.ln(3)\n\n    _heading(pdf, \"Recommendations\"\
          )\n    _bullets(pdf, report[\"recommendations\"])\n\n    filename = f\"\
          bi-summary_{datetime.now():%Y%m%d_%H%M%S}.pdf\"\n    b64 = base64.b64encode(bytes(pdf.output())).decode(\"\
          ascii\")\n    return {\n        # Raw base64 — use this if the file tool\
          \ has a \"base64\"/\"binary\" option.\n        \"pdf_base64\": b64,\n  \
          \      # Data URI — use this if the tool auto-decodes data: URLs. The PDF\
          \ was\n        # \"corrupt\" because the file tool wrote the base64 text\
          \ verbatim instead\n        # of decoding it first; one of these two forms\
          \ makes it decode.\n        \"filename\": filename,\n    }\n\n\ndef _heading(pdf:\
          \ FPDF, text: str) -> None:\n    pdf.set_font(\"Helvetica\", \"B\", 13)\n\
          \    pdf.set_text_color(*NAVY)\n    pdf.set_x(pdf.l_margin)\n    pdf.cell(0,\
          \ 8, text, new_x=\"LMARGIN\", new_y=\"NEXT\")\n    pdf.set_draw_color(200,\
          \ 200, 200)\n    pdf.set_line_width(0.2)\n    pdf.line(pdf.l_margin, pdf.get_y(),\
          \ pdf.w - pdf.r_margin, pdf.get_y())\n    pdf.ln(2)\n\n\ndef _body(pdf:\
          \ FPDF, text: str) -> None:\n    pdf.set_font(\"Helvetica\", \"\", 10)\n\
          \    pdf.set_text_color(30, 30, 30)\n    pdf.set_x(pdf.l_margin)\n    pdf.multi_cell(pdf.epw,\
          \ 5, text)\n\n\ndef _metrics_table(pdf: FPDF, metrics: list) -> None:\n\
          \    pdf.set_font(\"Helvetica\", \"\", 9)\n    pdf.set_text_color(30, 30,\
          \ 30)\n    heading_style = FontFace(emphasis=\"BOLD\", color=255, fill_color=NAVY)\n\
          \    with pdf.table(\n        col_widths=(38, 18, 44),\n        headings_style=heading_style,\n\
          \        cell_fill_color=ZEBRA,\n        cell_fill_mode=TableCellFillMode.ROWS,\n\
          \        line_height=6,\n    ) as table:\n        header = table.row()\n\
          \        for label in (\"Metric\", \"Value\", \"Note\"):\n            header.cell(label)\n\
          \        for m in metrics:\n            row = table.row()\n            row.cell(_s(m[\"\
          name\"]))\n            row.cell(_s(m[\"value\"]))\n            row.cell(_s(m.get(\"\
          note\", \"\")))\n\n\ndef _bullets(pdf: FPDF, items: list) -> None:\n   \
          \ pdf.set_font(\"Helvetica\", \"\", 10)\n    pdf.set_text_color(30, 30,\
          \ 30)\n    pdf.set_fill_color(*NAVY)\n    indent = 6.0   # mm of left indent\
          \ for the wrapped text\n    diameter = 1.6  # bullet size in mm\n    for\
          \ item in items:\n        y = pdf.get_y()\n        # Draw a filled dot vertically\
          \ centered on the first line (line height 5).\n        pdf.ellipse(pdf.l_margin\
          \ + 1.0, y + (5 - diameter) / 2, diameter, diameter, style=\"F\")\n    \
          \    pdf.set_x(pdf.l_margin + indent)\n        pdf.multi_cell(pdf.epw -\
          \ indent, 5, _s(str(item)))\n"
        code_language: python3
        outputs:
          filename:
            children: null
            type: string
          pdf_base64:
            children: null
            type: string
        selected: false
        title: Code
        type: code
        variables:
        - value_selector:
          - '1782820733717'
          - text
          value_type: string
          variable: report
